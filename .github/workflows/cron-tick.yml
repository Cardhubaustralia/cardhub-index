name: Price sync (manual fallback)

# Price sync now runs in Supabase (pg_cron -> sync-prices Edge Function).
# This workflow is kept only as a manual fallback / one-off full resync.
on:
  workflow_dispatch: {}

# Never let two ticks run at once (a long lockout sync + the next tick).
concurrency:
  group: cardhub-cron
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # lockout ticks run the full per-product price sync (~25 min)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run cycle:tick
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://lqwmsrwoyoalcuzxkzsu.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          TCGAPIS_API_KEY: ${{ secrets.TCGAPIS_API_KEY }}
